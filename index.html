<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTTPANEL V2</title>
    <style>
        body {
            background-color: #0d0000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
        }
        .panel {
            background: rgba(20, 0, 0, 0.95);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #ff0000;
            box-shadow: 0 0 25px #ff0000;
            text-align: center;
            width: 260px;
        }
        h2 { color: #ff0000; text-shadow: 0 0 10px #ff0000; margin-bottom: 30px; }
        
        .switch-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 40px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #ff0000; }
        input:checked + .slider:before { transform: translateX(24px); }

        .btn-lock {
            background: linear-gradient(145deg, #ff0000, #b30000);
            color: white;
            border: none;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
            text-transform: uppercase;
        }
        .btn-lock:active { transform: scale(0.96); box-shadow: 0 2px 5px rgba(255, 0, 0, 0.4); }
    </style>
</head>
<body>

<div class="panel">
    <h2>KTTPANEL V2</h2>
    <div class="switch-container">
        <span style="font-size: 18px;">สถานะระบบ</span>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>
    <button class="btn-lock">ล็อคket</button>
</div>

</body>
</html>
